<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestionale Didattica Interattiva</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#fdf7fb;min-height:100vh}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-track{background:#f0e0ea}
::-webkit-scrollbar-thumb{background:#D4168C;border-radius:3px}
.toast{position:fixed;bottom:24px;right:24px;background:#D4168C;color:#fff;border-radius:8px;
  padding:12px 20px;font-weight:700;font-size:14px;z-index:9999;
  box-shadow:0 4px 20px rgba(212,22,140,.35);animation:slideIn .2s ease;pointer-events:none}
.toast.err{background:#c0392b}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;
  display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:14px;padding:24px 28px;max-width:640px;width:100%;
  box-shadow:0 8px 40px rgba(212,22,140,.18);max-height:92vh;overflow-y:auto}
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:7px;font-weight:700;
  cursor:pointer;font-size:13px;padding:8px 16px;transition:background .15s;white-space:nowrap;font-family:inherit}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:#D4168C;color:#fff}.btn-primary:hover:not(:disabled){background:#9A0D65}
.btn-outline{background:#fff;border:2px solid #D4168C;color:#D4168C}.btn-outline:hover{background:#F7D6EE}
.btn-ghost{background:#e8e8e8;color:#222;border:1px solid #ccc}.btn-ghost:hover{background:#d4d4d4}
.btn-danger{background:#e24b4a;color:#fff}.btn-danger:hover{background:#b83a39}
.btn-success{background:#27ae60;color:#fff}.btn-success:hover{background:#1e8449}
.btn-info{background:#2980b9;color:#fff}.btn-info:hover{background:#1a5f7a}
.btn-warn{background:#e67e22;color:#fff}.btn-warn:hover{background:#ca6f1e}
.btn-teal{background:#16a085;color:#fff}.btn-teal:hover{background:#117a60}
.btn-violet{background:#8e44ad;color:#fff}.btn-violet:hover{background:#6c3483}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px}
.kpi-card{background:#fff;border:1px solid #f0e0ea;border-radius:10px;padding:14px 16px}
input,select,textarea{border:1.5px solid #EAA0D0;border-radius:7px;padding:7px 10px;font-size:13px;
  width:100%;outline:none;font-family:inherit;background:#fff;color:#222}
input:focus,select:focus{border-color:#D4168C;box-shadow:0 0 0 3px rgba(212,22,140,.1)}
label.lbl{font-size:12px;color:#444;display:block;margin-bottom:5px;font-weight:700}
.tab-nav{display:flex;gap:3px;background:#F7D6EE;border-radius:10px;padding:4px;margin-bottom:24px;flex-wrap:wrap}
.tab-nav button{flex:1;border:none;background:transparent;border-radius:7px;padding:9px 12px;
  font-weight:800;font-size:12px;cursor:pointer;color:#9A0D65;transition:all .15s;min-width:80px}
.tab-nav button.active{background:#D4168C;color:#fff;box-shadow:0 2px 8px rgba(212,22,140,.3)}
.slot-free:hover{background:#F7D6EE!important}
.filter-btn{border:2px solid #D4168C;border-radius:7px;padding:6px 14px;font-size:12px;
  font-weight:800;cursor:pointer;background:#fff;color:#D4168C;transition:all .15s;display:inline-block}
.filter-btn.active{background:#D4168C;color:#fff}
.filter-btn:hover{background:#F7D6EE;color:#D4168C}
.filter-btn.active:hover{background:#9A0D65;color:#fff}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  border-radius:8px;border:1.5px solid #e0c8d8;background:#fff;margin-bottom:8px;gap:8px}
.item-title{font-weight:700;font-size:13px;color:#1a1a1a}
.item-sub{font-size:11px;color:#555;margin-top:3px}
.badge{display:inline-block;font-size:10px;font-weight:800;border-radius:5px;padding:2px 8px;color:#fff}
.section-card{background:#fff;border-radius:12px;border:1px solid #f0e0ea;padding:16px 18px;margin-bottom:18px}
.action-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.ore-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border-bottom:1px solid #f5edf5;font-size:12px;color:#222}
.ore-row:last-child{border-bottom:none}
.ore-inp{width:70px!important;padding:4px 8px!important;font-size:12px!important}
.sync-banner{background:linear-gradient(135deg,#8e44ad,#D4168C);color:#fff;border-radius:10px;
  padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-container"></div>
<div id="modal-container"></div>
<script>
/* ═══════════════════════════════════════════════════════════════════
   GESTIONALE DIDATTICA INTERATTIVA — v7
   ═══════════════════════════════════════════════════════════════════ */
const M="#D4168C",ML="#F7D6EE",MD="#9A0D65",MM="#EAA0D0";
const TIME_SLOTS=["07:00-08:00","08:00-09:00","09:00-10:00","10:00-11:00","11:00-12:00",
  "12:00-13:00","13:00-14:00","14:00-15:00","15:00-16:00","16:00-17:00",
  "17:00-18:00","18:00-19:00","19:00-20:00","20:00-21:00","21:00-22:00"];
const DAYS_IT=["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];
const ICOL=["#F7D6EE","#D6EEF7","#D6F7E8","#F7EED6","#EED6F7","#F7D6D6","#D6D6F7","#EEF7D6",
  "#F7F0D6","#D6F7F7","#F0D6F7","#D6F7D6","#F7D6F0","#D6EAF7","#F7E8D6","#E8F7D6",
  "#F7D6E8","#D6F0F7","#F7F7D6","#E0D6F7","#D6F7EA","#F7D9D6","#D6F7F0","#F5F7D6","#D6DCF7"];

/* ── Utilità ─────────────────────────────────────────────────── */
function uid(){return'x'+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function fmtDate(d){return d.toISOString().split("T")[0]}
function isoDisp(iso){if(!iso)return"";const[y,m,day]=iso.split("-");return`${day}/${m}/${y}`}
function sk(d,s){return`${d}__${s}`}
function colorFor(ins,nome){const i=ins.findIndex(x=>x.nome===nome);return ICOL[i%ICOL.length]||ML}
function buildSlotMap(lz){const m={};lz.forEach(l=>{m[sk(l.data,l.fasciaOraria)]=l});return m}
function sortN(a){return[...a].sort((x,y)=>x.localeCompare(y,'it'))}
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function escA(s){return String(s||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function generateWeeks(start,end){
  const weeks=[],endD=new Date(end);let d=new Date(start);
  while(d<=endD){const w=[];for(let i=0;i<7;i++){const dd=new Date(d);dd.setDate(dd.getDate()+i);if(dd<=endD)w.push(dd)}weeks.push(w);d.setDate(d.getDate()+7)}
  return weeks;
}

/* ── Stato ───────────────────────────────────────────────────── */
const LS_KEY="gestionale_didattica_v7";
function emptyState(){
  return{insegnamenti:[],docenti:[],sessioni:[],sessioneAttiva:"",annoAccademico:"2025-2026",corsoDiLaurea:"Scienze Motorie L-22"};
}
function loadState(){
  try{const r=localStorage.getItem(LS_KEY);if(r){const p=JSON.parse(r);return{insegnamenti:p.insegnamenti||[],docenti:p.docenti||[],sessioni:p.sessioni||[],sessioneAttiva:p.sessioneAttiva||"",annoAccademico:p.annoAccademico||"2025-2026",corsoDiLaurea:p.corsoDiLaurea||"Scienze Motorie L-22"};}}catch{}
  return emptyState();
}
function saveState(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({insegnamenti:S.insegnamenti,docenti:S.docenti,sessioni:S.sessioni,sessioneAttiva:S.sessioneAttiva,annoAccademico:S.annoAccademico,corsoDiLaurea:S.corsoDiLaurea}));}catch{}
}

let S=loadState();
let ROLE="docente",AUTH=false,DOCSEL="",INSSEL="",DTAB="overview",DFILT="tutti",TF_DOC="";

// Assicura che sessioneAttiva punti a una sessione esistente
(function(){if(S.sessioni.length&&!S.sessioni.find(s=>s.id===S.sessioneAttiva))S.sessioneAttiva=S.sessioni[0].id;})();

/* ── Selettori ───────────────────────────────────────────────── */
function getSA(){if(!S.sessioni.length)return null;return S.sessioni.find(s=>s.id===S.sessioneAttiva)||S.sessioni[0];}
function getLZ(){const sa=getSA();return sa?sa.lezioni:[];}
function countLZ(nome){const sa=getSA();return sa?sa.lezioni.filter(l=>l.insegnamento===nome).length:0;}
function insForDoc(docNome){
  const d=S.docenti.find(x=>x.nome===docNome);
  if(!d||!d.insegnamenti||!d.insegnamenti.length)return S.insegnamenti;
  const ids=d.insegnamenti.map(x=>x.insId);
  return S.insegnamenti.filter(i=>ids.includes(i.id));
}
function maxOreForDocIns(docNome,insNome){
  const d=S.docenti.find(x=>x.nome===docNome);
  if(!d||!d.insegnamenti||!d.insegnamenti.length)return null;
  const ins=S.insegnamenti.find(i=>i.nome===insNome);if(!ins)return null;
  const e=d.insegnamenti.find(x=>x.insId===ins.id);return e?(e.maxOre??null):null;
}
function oreDocIns(docNome,insNome){const sa=getSA();if(!sa)return 0;return sa.lezioni.filter(l=>l.docente===docNome&&l.insegnamento===insNome).length;}
function checkSpazio(docNome,insNome,nOre){
  const ins=S.insegnamenti.find(i=>i.nome===insNome);if(!ins)return"Insegnamento non trovato.";
  const gUsato=countLZ(insNome);
  if(gUsato+nOre>ins.lezioniAssegnate)return`L'insegnamento "${insNome}" ha raggiunto il limite globale di ${ins.lezioniAssegnate} ore (usate: ${gUsato}).`;
  const maxOre=maxOreForDocIns(docNome,insNome);
  if(maxOre!=null){const dUsato=oreDocIns(docNome,insNome);if(dUsato+nOre>maxOre)return`Hai raggiunto il limite di ${maxOre} ore assegnate per "${insNome}" (inserite: ${dUsato}).`;}
  return null;
}

/* ── UI helpers ──────────────────────────────────────────────── */
function showToast(msg,isErr){const el=document.createElement("div");el.className="toast"+(isErr?" err":"");el.textContent=msg;document.getElementById("toast-container").appendChild(el);setTimeout(()=>el.remove(),3500);}
function showErr(msg){showToast(msg,true);}
function openModal(html){document.getElementById("modal-container").innerHTML=`<div class="modal-overlay" id="moverlay">${html}</div>`;document.getElementById("moverlay").addEventListener("click",e=>{if(e.target.id==="moverlay")closeModal();});}
function closeModal(){document.getElementById("modal-container").innerHTML="";}
function openConfirm(msg,onYes,yesLabel,yesClass){
  const cid=uid();(window._confirmCb=window._confirmCb||{})[cid]=onYes;
  openModal(`<div class="modal-box" style="max-width:400px"><div style="font-size:22px;text-align:center;margin-bottom:14px">⚠️</div>
    <p style="font-size:14px;color:#222;text-align:center;margin-bottom:22px;line-height:1.5">${escH(msg)}</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button id="conf-no" class="btn btn-ghost">Annulla</button>
      <button id="conf-yes" class="btn ${yesClass||'btn-danger'}">${yesLabel||'Sì, elimina'}</button>
    </div></div>`);
  document.getElementById("conf-no").onclick=closeModal;
  document.getElementById("conf-yes").onclick=()=>{closeModal();const cb=(window._confirmCb||{})[cid];if(cb)cb();};
}
function triggerDownload(content,filename,mime){
  const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.style.display="none";
  document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
}

/* ══════════════════════════════════════════════════════════════
   SINCRONIZZAZIONE DATI — Export/Import JSON stato
   Il presidente esporta lo stato completo come file JSON.
   I docenti importano il file JSON nel loro browser.
   ══════════════════════════════════════════════════════════════ */
function exportStato(){
  const payload=JSON.stringify({insegnamenti:S.insegnamenti,docenti:S.docenti,sessioni:S.sessioni,sessioneAttiva:S.sessioneAttiva,annoAccademico:S.annoAccademico,corsoDiLaurea:S.corsoDiLaurea,_v:7,_ts:Date.now()});
  const nome=S.corsoDiLaurea.replace(/[^a-zA-Z0-9]/g,'_');
  triggerDownload(payload,`stato_${nome}_${new Date().toISOString().slice(0,10)}.json`,"application/json;charset=utf-8");
  showToast("Stato esportato! Condividi il file con i docenti.");
}

function importStato(file,onDone){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.sessioni||!Array.isArray(parsed.sessioni))throw new Error("Formato non valido");
      S.insegnamenti=parsed.insegnamenti||[];
      S.docenti=parsed.docenti||[];
      S.sessioni=parsed.sessioni||[];
      S.sessioneAttiva=parsed.sessioneAttiva||S.sessioni[0]?.id||"";
      S.annoAccademico=parsed.annoAccademico||"2025-2026";
      S.corsoDiLaurea=parsed.corsoDiLaurea||"Scienze Motorie L-22";
      DOCSEL="";INSSEL="";
      saveState();
      if(onDone)onDone(true);
    }catch(err){if(onDone)onDone(false,err.message);}
  };
  reader.readAsText(file,'UTF-8');
}

/* ── Schermata di benvenuto per nuovi utenti ─────────────────── */
function showWelcomeScreen(){
  document.getElementById("root").innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fdf7fb 0%,#F7D6EE 100%);padding:20px">
    <div style="background:#fff;border-radius:20px;padding:40px 36px;max-width:500px;width:100%;box-shadow:0 12px 48px rgba(212,22,140,.18);text-align:center">
      <div style="font-size:52px;margin-bottom:12px">🎓</div>
      <h1 style="color:${MD};font-size:22px;font-weight:800;margin-bottom:8px">Gestionale Didattica Interattiva</h1>
      <p style="color:#666;font-size:14px;margin-bottom:28px;line-height:1.6">
        Nessun dato trovato nel tuo browser.<br>
        Importa il file <b>stato_*.json</b> fornito dal Presidente del CdS, oppure accedi come Presidente per configurare il sistema.
      </p>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="background:${ML};border-radius:12px;padding:18px">
          <div style="font-weight:800;color:${MD};margin-bottom:8px;font-size:14px">📥 Sono un docente</div>
          <p style="font-size:12px;color:#555;margin-bottom:12px">Carica il file JSON ricevuto dal Presidente</p>
          <input type="file" id="welcome-file" accept=".json" style="margin-bottom:10px"/>
          <button class="btn btn-primary" style="width:100%" id="welcome-import-btn">Carica e accedi</button>
        </div>
        <div style="border-top:1px solid #f0e0ea;padding-top:16px">
          <div style="font-weight:800;color:#555;margin-bottom:8px;font-size:14px">🔐 Sono il Presidente</div>
          <button class="btn btn-ghost" style="width:100%" id="welcome-pres-btn">Accedi come Presidente (configura il sistema)</button>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById("welcome-import-btn").addEventListener("click",()=>{
    const f=document.getElementById("welcome-file").files[0];
    if(!f){showErr("Seleziona prima un file JSON");return;}
    importStato(f,(ok,err)=>{
      if(ok){renderApp();showToast("Dati importati! Benvenuto.");}
      else{showErr("Errore importazione: "+(err||"file non valido"));}
    });
  });
  document.getElementById("welcome-pres-btn").addEventListener("click",()=>{
    // Crea uno stato vuoto, accedi come presidente
    ROLE="presidente";AUTH=false;
    renderApp();
  });
}

/* ── Export ICS ──────────────────────────────────────────────── */
function exportICS(docNome){
  const sa=getSA();if(!sa){showErr("Nessuna sessione attiva");return;}
  const lzDoc=sa.lezioni.filter(l=>l.docente===docNome);
  if(!lzDoc.length){showErr("Nessuna lezione trovata per "+docNome);return;}
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Gestionale Didattica//IT","CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:Lezioni "+docNome,"X-WR-TIMEZONE:Europe/Rome"];
  lzDoc.forEach(l=>{
    const[sT,eT]=l.fasciaOraria.split("-");const[y,mo,dd]=l.data.split("-");const[sh,sm]=sT.split(":");const[eh,em]=eT.split(":");
    lines.push("BEGIN:VEVENT","UID:"+uid()+"@gestionale","DTSTAMP:"+new Date().toISOString().replace(/[-:.Z]/g,'').slice(0,15)+"Z",
      "DTSTART;TZID=Europe/Rome:"+y+mo+dd+"T"+sh+sm+"00","DTEND;TZID=Europe/Rome:"+y+mo+dd+"T"+eh+em+"00",
      "SUMMARY:"+l.insegnamento+" - "+l.titolo,"DESCRIPTION:Docente: "+l.docente+"\\nInsegnamento: "+l.insegnamento,
      "LOCATION:Videoconferenza online","STATUS:CONFIRMED","END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  triggerDownload(lines.join("\r\n"),"lezioni_"+docNome.replace(/[^a-zA-Z0-9]/g,'_')+".ics","text/calendar;charset=utf-8");
  showToast(lzDoc.length+" lezioni esportate!");
}

/* ── Export CSV docenti ──────────────────────────────────────── */
function exportDocentiCSV(){
  const sa=getSA();const lz=sa?sa.lezioni:[];
  let visInsIds,visDocIds;
  if(sa&&sa.insegnamentiIds&&sa.insegnamentiIds.length){visInsIds=new Set(sa.insegnamentiIds);visDocIds=new Set(sa.docentiIds||[]);}
  else if(sa&&lz.length){
    visInsIds=new Set(lz.map(l=>{const i=S.insegnamenti.find(x=>x.nome===l.insegnamento);return i?i.id:null}).filter(Boolean));
    visDocIds=new Set(lz.map(l=>{const d=S.docenti.find(x=>x.nome===l.docente);return d?d.id:null}).filter(Boolean));
  }else{visInsIds=new Set();visDocIds=new Set();}
  const insOrd=sortN(S.insegnamenti.filter(i=>visInsIds.has(i.id)).map(i=>i.nome));
  const docOrd=sortN(S.docenti.filter(d=>visDocIds.has(d.id)).map(d=>d.nome));
  const rows=[["Docente","Totale ore",...insOrd]];
  docOrd.forEach(n=>{const op={};insOrd.forEach(x=>{op[x]=lz.filter(l=>l.docente===n&&l.insegnamento===x).length;});rows.push([n,Object.values(op).reduce((a,b)=>a+b,0),...insOrd.map(x=>op[x])]);});
  triggerDownload("\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n"),"ore_docenti.csv","text/csv;charset=utf-8");
  showToast("CSV esportato!");
}

function exportSessCSV(id){
  const sess=S.sessioni.find(s=>s.id===id);if(!sess)return;
  const rows=[["Data","Giorno","Fascia Oraria","Docente","Insegnamento","Titolo"]];
  sess.lezioni.forEach(l=>rows.push([l.data,l.giornoSettimana,l.fasciaOraria,l.docente,l.insegnamento,l.titolo]));
  triggerDownload("\uFEFF"+rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n"),sess.nome.replace(/[\s\/]/g,'_')+".csv","text/csv;charset=utf-8");
  showToast("CSV esportato!");
}

/* ── Slot modal ──────────────────────────────────────────────── */
function openSlotModal(iso,slot,dayName,lezId,pm){
  const sa=getSA();if(!sa)return;
  if(!pm&&!sa.modificabileDocenti){showErr("Sessione non modificabile dai docenti");return;}
  const slotMap=buildSlotMap(sa.lezioni);
  const lez=lezId?sa.lezioni.find(l=>l.id===lezId):null;
  const ni=TIME_SLOTS.indexOf(slot)+1;const ns=TIME_SLOTS[ni];const nf=ns&&!slotMap[sk(iso,ns)];
  const doc=pm?(lez?.docente||""):DOCSEL;const insNome=pm?(lez?.insegnamento||""):INSSEL;
  const iObj=S.insegnamenti.find(i=>i.nome===insNome);
  const ins_cnt=iObj?countLZ(iObj.nome):0;const ins_ass=iObj?iObj.lezioniAssegnate:12;
  const maxOre=pm?null:maxOreForDocIns(doc,insNome);const oreDoc=!pm?oreDocIns(doc,insNome):0;
  const spazio=Math.min(ins_ass-ins_cnt,maxOre!=null?(maxOre-oreDoc):(ins_ass-ins_cnt));
  const adocs=sortN(S.docenti.map(d=>d.nome));
  const ctxId=uid();(window._slotCtx=window._slotCtx||{})[ctxId]={iso,slot,dayName,lezId,pm,ns:ns||""};
  openModal(`<div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="color:${M};font-size:15px;font-weight:800">${lez?"Modifica lezione":`Inserisci — ${isoDisp(iso)} ${slot}`}</h3>
      <button id="btn-cs" style="border:none;background:none;cursor:pointer;font-size:22px;color:#999;line-height:1">×</button></div>
    ${pm?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div><label class="lbl">Docente</label><select id="m-doc"><option value="">—</option>${adocs.map(d=>`<option value="${escA(d)}"${lez?.docente===d?' selected':''}>${escH(d)}</option>`).join('')}</select></div>

function saveSlot(ctxId){
  const ctx=(window._slotCtx||{})[ctxId];if(!ctx)return;
  const{iso,slot,dayName,lezId,pm,ns}=ctx;
  const titolo=(document.getElementById("m-titolo")||{}).value?.trim();
  const doc=pm?(document.getElementById("m-doc")||{}).value:DOCSEL;
  const insNome=pm?(document.getElementById("m-ins")||{}).value:INSSEL;
  if(!titolo){showErr("Il titolo è obbligatorio");return;}
  if(!doc||!insNome){showErr("Seleziona docente e insegnamento");return;}
  const cb=document.getElementById("m-cc");const addC=cb&&cb.checked;const nOre=addC?2:1;
  if(!pm&&!lezId){const err=checkSpazio(doc,insNome,nOre);if(err){const el=document.getElementById("slot-err");if(el)el.textContent=err;else showErr(err);return;}}
  const t2=(document.getElementById("m-titolo2")||{}).value?.trim()||titolo;
  const nuove=[{id:uid(),data:iso,fasciaOraria:slot,docente:doc,insegnamento:insNome,titolo,giornoSettimana:dayName}];
  if(addC&&ns)nuove.push({id:uid(),data:iso,fasciaOraria:ns,docente:doc,insegnamento:insNome,titolo:t2,giornoSettimana:dayName});
  const sa=getSA();if(!sa)return;
  let lz=[...sa.lezioni];if(lezId)lz=lz.filter(l=>l.id!==lezId);
  nuove.forEach(n=>{if(!lz.find(x=>x.data===n.data&&x.fasciaOraria===n.fasciaOraria))lz.push(n);});
  S.sessioni=S.sessioni.map(s=>s.id===sa.id?{...s,lezioni:lz}:s);
  saveState();closeModal();renderApp();showToast(lezId?"Lezione aggiornata!":"Lezione inserita!");
}
function deleteLZ(lezId){
  openConfirm("Eliminare questa lezione?",()=>{
    const sa=getSA();if(!sa)return;

}

function cercaSlot(){
  const sa=getSA();if(!sa)return;
  const slotMap=buildSlotMap(sa.lezioni);const weeks=generateWeeks(sa.dataInizio,sa.dataFine);
  const fmap={mattina:TIME_SLOTS.slice(0,5),pomeriggio:TIME_SLOTS.slice(5,10),sera:TIME_SLOTS.slice(10)};
  const fascia=document.getElementById("rc-fascia")?.value||"tutti";const tipo=document.getElementById("rc-tipo")?.value||"singoli";
  const giorni=[...document.querySelectorAll(".rc-g:checked")].map(c=>c.value);
  const slots=fascia==="tutti"?TIME_SLOTS:(fmap[fascia]||TIME_SLOTS);
  const ins=S.insegnamenti.find(i=>i.nome===INSSEL);
  const maxOre=maxOreForDocIns(DOCSEL,INSSEL);const oreDoc=oreDocIns(DOCSEL,INSSEL);
  const spazioGlob=ins?(ins.lezioniAssegnate-countLZ(INSSEL)):0;
  const spazioDoc=maxOre!=null?(maxOre-oreDoc):spazioGlob;const spazio=Math.min(spazioGlob,spazioDoc);
  const res=[];
  weeks.forEach(wk=>wk.forEach((day,di)=>{
    if(di===6)return;const dn=DAYS_IT[di];if(giorni.length&&!giorni.includes(dn))return;const iso=fmtDate(day);
    if(tipo==="singoli"){slots.forEach(s=>{if(!slotMap[sk(iso,s)])res.push({iso,dn,s,tipo:"singola"});});}
    else{for(let i=0;i<slots.length-1;i++){const s1=slots[i],s2=slots[i+1];if(TIME_SLOTS.indexOf(s2)-TIME_SLOTS.indexOf(s1)===1&&!slotMap[sk(iso,s1)]&&!slotMap[sk(iso,s2)])res.push({iso,dn,s:s1,sc:s2,tipo:"doppia"});}}
  }));
  const top=res.slice(0,40);const rc=document.getElementById("rc-results");if(!rc)return;

/* ── CSV Carico Didattico ────────────────────────────────────── */
let _csvParsed=null,_csvSessionInsIds=[],_csvSessionDocIds=[];
function parseCSVCarico(text){
  function parseRow(line){const res=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){res.push(cur.trim());cur='';}else cur+=c;}res.push(cur.trim());return res;}
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());if(lines.length<2)return null;
  const rows=[];const cdsList=new Set();
  for(let i=1;i<lines.length;i++){const r=parseRow(lines[i]);if(r.length<6)continue;const cds=(r[5]||'').trim();if(!cds)continue;cdsList.add(cds);rows.push(r);}
  return{cdsList:[...cdsList].sort(),rows};
}
function onCSVFileChange(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{const parsed=parseCSVCarico(e.target.result);if(!parsed||!parsed.rows.length){showErr("File CSV non valido o vuoto.");return;}
    _csvParsed=parsed;const box=document.getElementById("csv-step2");if(!box)return;
    box.innerHTML=`<label class="lbl" style="margin-top:4px">Seleziona il Corso di Studi *</label><select id="csv-cds" style="margin-bottom:10px"><option value="">— Scegli CdS —</option>${parsed.cdsList.map(c=>`<option value="${escA(c)}">${escH(c)}</option>`).join('')}</select><div id="csv-preview" style="font-size:12px;color:#555;min-height:20px"></div>`;
    document.getElementById("csv-cds")?.addEventListener("change",onCSVCdsChange);};
  reader.readAsText(file,'UTF-8');
}
function onCSVCdsChange(){
  const cds=(document.getElementById("csv-cds")||{}).value;if(!cds||!_csvParsed)return;
  const rows=_csvParsed.rows.filter(r=>(r[5]||'').trim()===cds);const insSet=new Set();const docSet=new Set();
  rows.forEach(r=>{const n=(r[2]||'').trim();if(n)insSet.add(n);[[12],[16],[20],[24]].forEach(([di])=>{const d=(r[di]||'').trim();if(d)docSet.add(d);});});
  const prev=document.getElementById("csv-preview");if(prev)prev.innerHTML=`<span style="color:#27ae60;font-weight:700">✅ Trovati: ${insSet.size} insegnamenti, ${docSet.size} docenti</span>`;
}
function applyCSVImport(cds){
  if(!_csvParsed||!cds)return false;
  const rows=_csvParsed.rows.filter(r=>(r[5]||'').trim()===cds);if(!rows.length)return false;
  const insMap={};const docMap={};
  rows.forEach(r=>{const insNome=(r[2]||'').trim();if(!insNome)return;const oreGlob=parseInt(r[10])||0;if(!insMap[insNome]||oreGlob>0)insMap[insNome]=oreGlob;const coppie=[[12,13],[16,17],[20,21],[24,25]];coppie.forEach(([ni,oi])=>{const docNome=(r[ni]||'').trim();const oreDoc=parseInt(r[oi])||0;if(!docNome||oreDoc<=0)return;if(!docMap[docNome])docMap[docNome]={};docMap[docNome][insNome]=(docMap[docNome][insNome]||0)+oreDoc;});});
  const sessionInsIds=[],sessionDocIds=[];
  Object.entries(insMap).forEach(([nome,ore])=>{let ex=S.insegnamenti.find(i=>i.nome.toLowerCase()===nome.toLowerCase());if(ex){S.insegnamenti=S.insegnamenti.map(i=>i.id===ex.id?{...i,lezioniAssegnate:ore>0?ore:i.lezioniAssegnate}:i);sessionInsIds.push(ex.id);}else{const nI={id:uid(),nome,lezioniAssegnate:ore>0?ore:12};S.insegnamenti.push(nI);sessionInsIds.push(nI.id);}});
  Object.entries(docMap).forEach(([docNome,insOreMap])=>{const insegnamenti=Object.entries(insOreMap).map(([iN,mo])=>{const ins=S.insegnamenti.find(i=>i.nome.toLowerCase()===iN.toLowerCase());if(!ins)return null;return{insId:ins.id,maxOre:mo>0?mo:null};}).filter(Boolean);let ex=S.docenti.find(d=>d.nome.toLowerCase()===docNome.toLowerCase());if(ex){const eI=[...(ex.insegnamenti||[])];insegnamenti.forEach(ni=>{const idx=eI.findIndex(x=>x.insId===ni.insId);if(idx>=0)eI[idx]={...eI[idx],maxOre:ni.maxOre};else eI.push(ni);});S.docenti=S.docenti.map(d=>d.id===ex.id?{...d,insegnamenti:eI}:d);sessionDocIds.push(ex.id);}else{const nD={id:uid(),nome:docNome,insegnamenti};S.docenti.push(nD);sessionDocIds.push(nD.id);}});
  _csvSessionInsIds=sessionInsIds;_csvSessionDocIds=sessionDocIds;return true;
}

function saveSess(id){
  const nome=(document.getElementById("s-nome")||{}).value?.trim();const ini=(document.getElementById("s-ini")||{}).value;const fin=(document.getElementById("s-fin")||{}).value;const vis=document.getElementById("s-vis")?.checked;const mod=document.getElementById("s-mod")?.checked;
  if(!nome||!ini||!fin){showErr("Compila tutti i campi");return;}if(ini>fin){showErr("Data inizio deve precedere data fine");return;}
  let csvApplied=false;
  if(!id&&_csvParsed){const cds=(document.getElementById("csv-cds")||{}).value;if(cds){csvApplied=applyCSVImport(cds);if(!csvApplied){showErr("Errore importazione CSV");return;}}}
  if(id){S.sessioni=S.sessioni.map(s=>s.id===id?{...s,nome,dataInizio:ini,dataFine:fin,visibileDocenti:!!vis,modificabileDocenti:!!mod}:s);showToast("Sessione aggiornata!");}
  else{const ns={id:uid(),nome,dataInizio:ini,dataFine:fin,visibileDocenti:!!vis,modificabileDocenti:!!mod,lezioni:[],insegnamentiIds:csvApplied?[..._csvSessionInsIds]:null,docentiIds:csvApplied?[..._csvSessionDocIds]:null};S.sessioni.push(ns);S.sessioneAttiva=ns.id;showToast(csvApplied?"✅ Sessione creata e carico importato!":"Sessione creata!");}
  _csvParsed=null;_csvSessionInsIds=[];_csvSessionDocIds=[];saveState();closeModal();renderApp();
}

  const right=document.createElement("div");right.style.cssText="margin-left:auto;display:flex;gap:8px";
  const b1=document.createElement("button");b1.className="btn btn-primary btn-sm";b1.textContent="⬇ Esporta CSV";b1.addEventListener("click",()=>exportSessCSV(sa?.id||""));
  const b2=document.createElement("button");b2.className="btn btn-warn btn-sm";b2.textContent="🔄 Reset lezioni";b2.addEventListener("click",()=>openConfirm("Resettare TUTTE le lezioni della sessione attiva?",()=>{const sa=getSA();if(!sa)return;S.sessioni=S.sessioni.map(s=>s.id===sa.id?{...s,lezioni:[]}:s);saveState();renderApp();showToast("Sessione resettata.");}));
  right.appendChild(b1);right.appendChild(b2);ar.appendChild(right);wrap.appendChild(ar);
  const tbDiv=document.createElement("div");wrap.appendChild(tbDiv);cont.innerHTML="";cont.appendChild(wrap);
  document.getElementById("tf-doc")?.addEventListener("change",e=>{TF_DOC=e.target.value;renderApp();});
  renderTabellone(tbDiv,true,TF_DOC||null);
}

/* ── Anagrafiche ─────────────────────────────────────────────── */
function renderAnagrafiche(cont){
  const sa=getSA();const wrap=document.createElement("div");wrap.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:24px";
  let visInsIds,visDocIds;
  if(sa&&sa.insegnamentiIds&&sa.insegnamentiIds.length){visInsIds=new Set(sa.insegnamentiIds);visDocIds=new Set(sa.docentiIds||[]);}
  else if(sa&&sa.lezioni&&sa.lezioni.length){visInsIds=new Set(sa.lezioni.map(l=>{const i=S.insegnamenti.find(x=>x.nome===l.insegnamento);return i?i.id:null}).filter(Boolean));visDocIds=new Set(sa.lezioni.map(l=>{const d=S.docenti.find(x=>x.nome===l.docente);return d?d.id:null}).filter(Boolean));}
  else{visInsIds=new Set();visDocIds=new Set();}
  const sessLabel=sa?` — ${escH(sa.nome)}`:'';
  // Docenti
  const docCol=document.createElement("div");const docHdr=document.createElement("div");docHdr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px";
  docHdr.innerHTML=`<div><h3 style="color:#1a1a1a;font-weight:800;font-size:15px">👩‍🏫 Docenti</h3><div style="font-size:11px;color:#888;margin-top:2px">Sessione attiva${sessLabel}</div></div>`;
  const dbtns=document.createElement("div");dbtns.style.cssText="display:flex;gap:6px;flex-shrink:0";
  const csvBtn=document.createElement("button");csvBtn.className="btn btn-teal btn-xs";csvBtn.textContent="⬇ Export CSV ore";csvBtn.addEventListener("click",exportDocentiCSV);
  const addD=document.createElement("button");addD.className="btn btn-primary btn-xs";addD.textContent="+ Aggiungi";addD.addEventListener("click",()=>openDocModal(null));
  dbtns.appendChild(csvBtn);dbtns.appendChild(addD);docHdr.appendChild(dbtns);docCol.appendChild(docHdr);
  const docList=document.createElement("div");docList.style.cssText="max-height:560px;overflow-y:auto;padding-right:4px";
  const docentiVis=sortN(S.docenti.filter(d=>visDocIds.has(d.id)).map(d=>d.nome));
  if(!docentiVis.length){const e=document.createElement("p");e.style.cssText="font-size:13px;color:#888;padding:12px 0";e.textContent="Nessun docente per la sessione attiva.";docList.appendChild(e);}
  docentiVis.forEach(nome=>{
    const d=S.docenti.find(x=>x.nome===nome);const ni=d?.insegnamenti?.filter(x=>visInsIds.has(x.insId)).length||0;const niTot=d?.insegnamenti?.length||0;const oreD=sa?sa.lezioni.filter(l=>l.docente===nome).length:0;
    const item=document.createElement("div");item.className="list-item";const info=document.createElement("div");info.style.cssText="flex:1;min-width:0";
    info.innerHTML=`<div class="item-title">${escH(nome)}</div><div class="item-sub">${niTot===0?"Tutti gli insegnamenti":`${ni} ins. in questa sessione`} · ${oreD} ore inserite</div>`;
    const bx=document.createElement("div");bx.style.cssText="display:flex;gap:6px;flex-shrink:0";
    const eb=document.createElement("button");eb.className="btn btn-ghost btn-xs";eb.textContent="✏️ Modifica";eb.addEventListener("click",()=>openDocModal(d.id));
    const db=document.createElement("button");db.className="btn btn-danger btn-xs";db.textContent="🗑";db.addEventListener("click",()=>deleteDoc(d.id));
    bx.appendChild(eb);bx.appendChild(db);item.appendChild(info);item.appendChild(bx);docList.appendChild(item);
  });
  docCol.appendChild(docList);wrap.appendChild(docCol);
  // Insegnamenti
  const insCol=document.createElement("div");const insHdr=document.createElement("div");insHdr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px";
  insHdr.innerHTML=`<div><h3 style="color:#1a1a1a;font-weight:800;font-size:15px">📚 Insegnamenti</h3><div style="font-size:11px;color:#888;margin-top:2px">Sessione attiva${sessLabel}</div></div>`;
  const addI=document.createElement("button");addI.className="btn btn-primary btn-xs";addI.textContent="+ Aggiungi";addI.addEventListener("click",()=>openInsModal(null));insHdr.appendChild(addI);insCol.appendChild(insHdr);
  const insList=document.createElement("div");insList.style.cssText="max-height:560px;overflow-y:auto;padding-right:4px";
  const insVis=S.insegnamenti.filter(i=>visInsIds.has(i.id));
  if(!insVis.length){const e=document.createElement("p");e.style.cssText="font-size:13px;color:#888;padding:12px 0";e.textContent="Nessun insegnamento per la sessione attiva.";insList.appendChild(e);}
  insVis.forEach(ins=>{
    const oreIns=sa?sa.lezioni.filter(l=>l.insegnamento===ins.nome).length:0;const item=document.createElement("div");item.className="list-item";const info=document.createElement("div");info.style.cssText="flex:1;min-width:0";
    info.innerHTML=`<div class="item-title" style="font-size:12px">${escH(ins.nome)}</div><div class="item-sub">${ins.lezioniAssegnate} ore previste · ${oreIns} inserite</div>`;
    const bx=document.createElement("div");bx.style.cssText="display:flex;gap:6px;flex-shrink:0";
    const eb=document.createElement("button");eb.className="btn btn-ghost btn-xs";eb.textContent="✏️ Modifica";eb.addEventListener("click",()=>openInsModal(ins.id));
    const db=document.createElement("button");db.className="btn btn-danger btn-xs";db.textContent="🗑";db.addEventListener("click",()=>deleteIns(ins.id));
    bx.appendChild(eb);bx.appendChild(db);item.appendChild(info);item.appendChild(bx);insList.appendChild(item);
  });
  insCol.appendChild(insList);wrap.appendChild(insCol);cont.innerHTML="";cont.appendChild(wrap);
}
function openDocModal(id){
  const d=id?S.docenti.find(x=>x.id===id):null;const vinc=d?.insegnamenti||[];const vmap={};vinc.forEach(v=>{vmap[v.insId]={checked:true,maxOre:v.maxOre};});
  const sa=getSA();let sessInsIds;
  if(sa&&sa.insegnamentiIds&&sa.insegnamentiIds.length)sessInsIds=new Set(sa.insegnamentiIds);
  else if(sa&&sa.lezioni&&sa.lezioni.length)sessInsIds=new Set(sa.lezioni.map(l=>{const i=S.insegnamenti.find(x=>x.nome===l.insegnamento);return i?i.id:null}).filter(Boolean));
  else sessInsIds=new Set();
  const insS=S.insegnamenti.filter(i=>sessInsIds.has(i.id));
  openModal(`<div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="color:${M};font-weight:800;font-size:15px">${d?"Modifica docente":"Nuovo docente"}</h3><button id="dm-close" style="border:none;background:none;cursor:pointer;font-size:22px;color:#999">×</button></div>
    <div style="margin-bottom:13px"><label class="lbl">Nome e cognome *</label><input type="text" id="d-nome" value="${escA(d?.nome||'')}" placeholder="Nome Cognome"/></div>
    <div style="margin-bottom:6px"><label class="lbl">Insegnamenti abilitati e ore massime</label><p style="font-size:11px;color:#555;margin-bottom:8px">Tutto deselezionato = tutti gli insegnamenti. Spunta per vincolare; inserisci max ore (vuoto = nessun limite).</p>
      <div style="max-height:280px;overflow-y:auto;border:1.5px solid #e0c8d8;border-radius:8px;background:#fafafa">
        <div class="ore-row" style="background:${ML};font-weight:700;color:#1a1a1a;border-radius:8px 8px 0 0"><span style="flex:0 0 24px"></span><span style="flex:1">Insegnamento</span><span style="flex:0 0 90px;text-align:center;font-size:11px">Max ore</span></div>
        ${insS.map(ins=>{const v=vmap[ins.id]||{};return`<div class="ore-row"><input type="checkbox" class="d-ins-cb" value="${ins.id}" ${v.checked?'checked':''} style="width:auto;accent-color:${M};flex:0 0 auto" onchange="toggleOreInput(this)"/><span style="flex:1;color:#222;font-size:12px">${escH(ins.nome)}</span><input type="number" class="ore-inp d-ore-inp" data-ins="${ins.id}" value="${v.maxOre!=null?v.maxOre:''}" min="1" placeholder="∞" style="${v.checked?'':'display:none'}"/></div>`;}).join('')}
      </div></div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px"><button id="dm-cancel" class="btn btn-ghost">Annulla</button><button id="dm-save" class="btn btn-primary">Salva</button></div></div>`);
  document.getElementById("dm-close").onclick=closeModal;document.getElementById("dm-cancel").onclick=closeModal;document.getElementById("dm-save").onclick=()=>saveDoc(id||"");
}
function toggleOreInput(cb){const inp=cb.closest(".ore-row")?.querySelector(".d-ore-inp");if(inp)inp.style.display=cb.checked?"":"none";}
function saveDoc(id){
  const nome=(document.getElementById("d-nome")||{}).value?.trim();if(!nome){showErr("Il nome è obbligatorio");return;}
  const cbs=[...document.querySelectorAll(".d-ins-cb:checked")];const insegnamenti=cbs.map(cb=>{const inp=cb.closest(".ore-row")?.querySelector(".d-ore-inp");const maxOre=inp&&inp.value?parseInt(inp.value):null;return{insId:cb.value,maxOre:isNaN(maxOre)?null:maxOre};});
  if(id){S.docenti=S.docenti.map(d=>d.id===id?{...d,nome,insegnamenti}:d);showToast("Docente aggiornato!");}
  else{if(S.docenti.find(d=>d.nome.toLowerCase()===nome.toLowerCase())){showErr("Docente già esistente");return;}S.docenti.push({id:uid(),nome,insegnamenti});showToast("Docente aggiunto!");}
  saveState();closeModal();renderApp();
}
function deleteDoc(id){openConfirm("Eliminare questo docente?",()=>{S.docenti=S.docenti.filter(d=>d.id!==id);saveState();renderApp();showToast("Docente eliminato.");});}
function openInsModal(id){
  const ins=id?S.insegnamenti.find(i=>i.id===id):null;
  openModal(`<div class="modal-box" style="max-width:420px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="color:${M};font-weight:800;font-size:15px">${ins?"Modifica":"Nuovo"} insegnamento</h3><button id="im-close" style="border:none;background:none;cursor:pointer;font-size:22px;color:#999">×</button></div>
    <div style="margin-bottom:12px"><label class="lbl">Nome insegnamento *</label><input type="text" id="i-nome" value="${escA(ins?.nome||'')}" placeholder="Nome insegnamento"/></div>
    <div style="margin-bottom:12px"><label class="lbl">Lezioni previste</label><input type="number" id="i-lez" value="${ins?.lezioniAssegnate||12}" min="1"/></div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px"><button id="im-cancel" class="btn btn-ghost">Annulla</button><button id="im-save" class="btn btn-primary">Salva</button></div></div>`);
  document.getElementById("im-close").onclick=closeModal;document.getElementById("im-cancel").onclick=closeModal;document.getElementById("im-save").onclick=()=>saveIns(id||"");
}
function saveIns(id){
  const nome=(document.getElementById("i-nome")||{}).value?.trim();const lez=parseInt((document.getElementById("i-lez")||{}).value)||12;if(!nome){showErr("Il nome è obbligatorio");return;}
  if(id)S.insegnamenti=S.insegnamenti.map(i=>i.id===id?{...i,nome,lezioniAssegnate:lez}:i);else S.insegnamenti.push({id:uid(),nome,lezioniAssegnate:lez});
  saveState();closeModal();renderApp();showToast(id?"Aggiornato!":"Insegnamento aggiunto!");
}
function deleteIns(id){openConfirm("Eliminare questo insegnamento?",()=>{S.insegnamenti=S.insegnamenti.filter(i=>i.id!==id);saveState();renderApp();showToast("Eliminato.");});}

/* ── Navbar + render principale ──────────────────────────────── */
function renderApp(){
  document.getElementById("root").innerHTML=`
  <div style="background:${M};color:#fff;padding:0 24px;display:flex;align-items:center;gap:20px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(212,22,140,.35)">
    <div style="font-weight:800;font-size:15px">🎓 ${escH(S.corsoDiLaurea||"Gestionale Didattica")}</div>
    <div style="font-size:12px;opacity:.85">A.A. ${S.annoAccademico}</div>
    <div style="margin-left:auto;display:flex;gap:8px" id="nav-btns"></div>
  </div>
  <div style="max-width:1440px;margin:0 auto;padding:28px 20px">
    <div style="margin-bottom:22px">
      <h1 style="margin:0;font-size:22px;font-weight:800;color:${MD}">${ROLE==='docente'?"Inserimento Lezioni":"Dashboard Presidente"}</h1>
      <p style="margin:5px 0 0;color:#555;font-size:13px">${ROLE==='docente'?"Seleziona il tuo nome e l'insegnamento, poi inserisci le lezioni nel tabellone.":"Gestisci sessioni, tabellone, insegnamenti e docenti."}</p>
    </div>
    <div id="vc"></div>
  </div>`;
  ["docente","presidente"].forEach(r=>{
    const b=document.createElement("button");b.textContent=r==="docente"?"👩‍🏫 Docente":"👔 Presidente CdS";
    b.style.cssText=`background:${ROLE===r?'#fff':'transparent'};color:${ROLE===r?M:'#fff'};border:2px solid #fff;border-radius:20px;padding:5px 16px;font-weight:800;font-size:12px;cursor:pointer;transition:all .15s`;
    b.addEventListener("click",()=>switchRole(r));document.getElementById("nav-btns").appendChild(b);
  });
  // Pulsante export stato (solo presidente autenticato)
  if(ROLE==="presidente"&&AUTH){
    const expBtn=document.createElement("button");expBtn.className="btn btn-sm";
    expBtn.style.cssText="background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.5);padding:5px 12px;font-size:12px";
    expBtn.textContent="📤 Esporta stato per docenti";expBtn.addEventListener("click",exportStato);
    document.getElementById("nav-btns").appendChild(expBtn);
  }
  const vc=document.getElementById("vc");
  if(ROLE==="docente")renderVistaDocente(vc);else renderDashboard(vc);
}
function switchRole(r){ROLE=r;if(r==="presidente"&&!AUTH)AUTH=false;renderApp();}

/* ── Avvio ───────────────────────────────────────────────────── */
// Se non ci sono dati, mostra la schermata di benvenuto
if(!S.sessioni.length){showWelcomeScreen();}else{renderApp();}
</script>
</body>
</html>
